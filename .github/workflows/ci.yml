name: CI - Adaptive Leveling System

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: Install dependencies
        run: poetry install
      - name: Run Ruff (Linting)
        run: poetry run ruff check .
      - name: Check Formatting (Ruff)
        run: poetry run ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: Install dependencies
        run: poetry install
      - name: Run MyPy (Type Checking)
        run: poetry run mypy .

  test:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Infrastructure
        run: |
          docker compose up -d
          # Wait for services to be healthy
          timeout 60s bash -c "until docker inspect --format='{{json .State.Health.Status}}' als-db | grep -q 'healthy'; do sleep 2; done"
          timeout 60s bash -c "until docker inspect --format='{{json .State.Health.Status}}' als-s3 | grep -q 'healthy'; do sleep 2; done"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install

      - name: Run Database Migrations
        run: make migrate

      - name: Run Tests with Coverage
        env:
          DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5435/postgres?sslmode=disable"
          REDIS_URL: "redis://127.0.0.1:6385/0"
          S3_ENDPOINT_URL: "http://127.0.0.1:9005"
          AWS_ACCESS_KEY_ID: "minioadmin"
          AWS_SECRET_ACCESS_KEY: "minioadmin"
          LLM_PROVIDER: "mock"
        run: poetry run pytest --cov=backend --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false
